query check_user_email($email:String!){
  items: users(
    page: 1,
    per_page: 1,
    filter: {
      deleted_at: { exists:false }
      email: { value: $email }
    }
  ){
    total_entries
    results{
      id
      external_id
      email
      deleted_at
      profiles(profile_type: "modules/insites_core/crm_contact"){
        id
        profile_type
        properties
      }
    }
  }
} 
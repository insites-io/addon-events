query get_address(
  $user_uuid: String!,
  $related_type: String,
  $page: Int = 1,
  $size: Int = 50
  $id: ID
){
  items: records(
    page: $page
    per_page: $size
    filter:{
      id:{ value: $id }
      table: { value: "modules/insites_core/crm_address" } 
      deleted_at: { exists: false }
      properties:[
        { name:"related_uuid", value: $user_uuid }
        { name:"related_type", value: $related_type }
      ]
    }
  ){
    total_entries
    total_pages
    results{
      id
      uuid: property(name: "uuid")
      address_1: property(name: "address_1")
      address_2: property(name: "address_2") 
      address_3: property(name: "address_3") 
      suburb: property(name: "suburb") 
      state: property(name: "state") 
      postcode: property(name: "postcode") 
      country: property(name: "country")      
    }
  }
}
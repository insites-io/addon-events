query get_cart_discount (
  $page: Int=1,
  $size: Int=1,
  $contact_uuid: String!,
  $discount_code_uuids: [String!]
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/cart" }
      properties: [
        { name: "contact_uuid", value: $contact_uuid }
        { name: "discount_code_uuids", array_contains: $discount_code_uuids }
      ] 
    }
  ) {
    total_entries    
    results {
      id 
      contact_uuid: property(name: "contact_uuid")
      discount_code_uuids: property_array(name: "discount_code_uuids")  
    }
  }
}
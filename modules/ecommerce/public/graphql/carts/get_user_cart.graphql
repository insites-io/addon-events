query get_user_cart (
  $page: Int=1,
  $size: Int=1,
  $contact_uuid: String!
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/cart" }
      properties: [
        { name: "contact_uuid", value: $contact_uuid }
      ] 
    }
  ) {
    total_entries    
    results {
      id 
      contact_uuid: property(name: "contact_uuid")
      items: property_array(name: "items")      
      #properties
    }
  }
}
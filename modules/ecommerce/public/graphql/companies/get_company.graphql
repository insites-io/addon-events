query get_company (
  $size: Int = 1
  $page: Int = 1
  $uuid: String
  $keyword: String
  $company_name: String
){
    items: records(
        per_page: $size
        page: $page
        filter: {
            deleted_at:{ exists: false }
            table: { value: "modules/insites_core/crm_company" }
          	properties: [
              { name: "is_archived", value_boolean: false } 
              {name: "uuid", value: $uuid}
              { name: "company_name", contains: $keyword, value: $company_name }
            ]
        }
    ) {
    		total_entries
        results { 
          id     
          uuid: property(name: "uuid")
          company_name: property(name: "company_name")
        }
    }
}
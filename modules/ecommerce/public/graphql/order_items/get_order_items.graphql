query get_order_items (
  $page: Int=1
  $size: Int=50
  $order_uuid: String!
  $is_product_info_needed: Boolean
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/order_item" }
      properties: [
        { name: "order_uuid", value: $order_uuid }
      ] 
    }
  ) {
    total_entries    
    results {
      id       
      product_uuid: property(name: "product_uuid")
      sku: property(name: "sku")
      quantity: property_int(name: "quantity")
      item_price: property_float(name: "item_price")
      is_fixed_tax_amount: property_boolean(name: "is_fixed_tax_amount")  
      tax_amount: property_float(name: "tax_amount")
      order_item_name: property(name: "order_item_name")
      order_item_image: property(name: "order_item_image")      
    },
    results @include(if: $is_product_info_needed){
      product: related_record(
        table: "modules/insites_ecommerce/product"
        join_on_property: "product_uuid"
        foreign_property: "uuid"
      ) {
        id
        sku: property(name: "sku")
        product_name: property(name: "product_name")
        regular_price: property_float(name: "regular_price")
        sale_price: property_float(name: "sale_price")
        is_on_sale: property_boolean(name: "is_on_sale")
        
        variants: related_records(
        	table: "modules/insites_ecommerce/product_variant"
          join_on_property: "uuid"
          foreign_property: "product_uuid"
        ){
          #properties
          id
          is_on_sale: property_boolean(name: "is_product_on_sale")
          sale_price: property_float(name: "sale_price")  
          regular_price: property_float(name: "regular_price") 
          stock_level: property_int(name: "stock_level") 
          sku: property(name: "product_sku")
          product_options: property_array(name: "product_options")  
        }
        
        #properties
      }
    }
  }
}
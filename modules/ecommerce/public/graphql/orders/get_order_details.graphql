query get_order_details (
  $id: ID
  $uuid: String
  $is_shipping_info_needed: Boolean=false
  ){
  items: records(
    per_page: 1
    filter: {
      id: { value: $id }
      deleted_at:{ exists:false }
      table: { value: "modules/insites_ecommerce/order" }
      properties:[
        { name: "uuid", value: $uuid }
      ]
    }
  ){
    results {
			
      id
      uuid: property(name: "uuid")      
      order_reference: property(name: "order_reference")
      date_time: property(name: "date_time")       
      notes: property(name: "notes")

      order_contact_email: property(name: "order_contact_email")
      order_company_name: property(name: "order_company_name")      
      order_contact_first_name: property(name: "order_contact_first_name")
      order_contact_last_name: property(name: "order_contact_last_name")
      order_contact_phone_number: property(name: "order_contact_phone_number") 
      order_contact_phone_country_code: property(name: "order_contact_phone_country_code")
      
      billing_company_name: property(name: "billing_company_name")
      billing_contact_first_name: property(name: "billing_contact_first_name") 
      billing_contact_last_name: property(name: "billing_contact_last_name") 
      billing_contact_email: property(name: "billing_contact_email") 
      billing_contact_phone_country_code: property(name: "billing_contact_phone_country_code") 
      billing_contact_phone_number: property(name: "billing_contact_phone_number") 
      billing_address_1: property(name: "billing_address_1") 
      billing_address_2: property(name: "billing_address_2") 
      billing_address_3: property(name: "billing_address_3") 
      billing_city: property(name: "billing_city") 
      billing_state: property(name: "billing_state") 
      billing_postcode: property(name: "billing_postcode") 
      billing_country: property(name: "billing_country")   
      
      total_tax_amount: property_float(name: "total_tax_amount")   
      total_amount: property_float(name: "total_amount")  
      
      order_status: property(name: "order_status")    
      order_payment_status: property(name: "order_payment_status") 
      order_shipping_status: property(name: "order_shipping_status")     
                       
      payment: related_record(
        table: "modules/insites_ecommerce/payment"
        join_on_property: "uuid"
        foreign_property: "order_uuid"
        sort: { updated_at: { order: DESC }}
      ) {
        card_brand: property(name: "card_brand")
        card_last_four_digits: property(name: "card_last_four_digits")
        card_expiry_month: property(name: "card_expiry_month")
        card_expiry_year: property(name: "card_expiry_year")        
      }
     
    },
    results @include(if: $is_shipping_info_needed){
      
      shipping_company_name: property(name: "shipping_company_name")
      shipping_contact_first_name: property(name: "shipping_contact_first_name") 
      shipping_contact_last_name: property(name: "shipping_contact_last_name") 
      shipping_contact_email: property(name: "shipping_contact_email") 
      shipping_contact_phone_country_code: property(name: "shipping_contact_phone_country_code") 
      shipping_contact_phone_number: property(name: "shipping_contact_phone_number") 
      shipping_address_1: property(name: "shipping_address_1") 
      shipping_address_2: property(name: "shipping_address_2") 
      shipping_address_3: property(name: "shipping_address_3") 
      shipping_city: property(name: "shipping_city") 
      shipping_state: property(name: "shipping_state") 
      shipping_postcode: property(name: "shipping_postcode") 
      shipping_country: property(name: "shipping_country")   
      shipping_instructions: property(name: "shipping_instructions")                      
    }
  }
}
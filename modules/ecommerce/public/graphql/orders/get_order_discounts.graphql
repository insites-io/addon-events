query get_order_discounts (
  $page: Int=1,
  $size: Int=50,
  $order_contact_email: String!,
  $discount_code_uuids: [String!]
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/order" }
      properties: [
        { name: "order_contact_email", value: $order_contact_email }
        { name: "discount_code_uuids", array_contains: $discount_code_uuids }
      ] 
    }
  ) {
    total_entries    
    results {
      id 
      order_contact_email: property(name: "order_contact_email")      
      discount_code_uuids: property_array(name: "discount_code_uuids")  
    }
  }
}
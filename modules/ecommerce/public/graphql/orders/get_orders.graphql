query get_orders (
  $page: Int = 1,
  $size: Int = 100,
  $order_contact_uuid: String,
  $keyword: ID,
  # $keyword: String,
  $dateFrom: String,
  $dateTo: String
  $orderStatus: [String!]
  $sort:[RecordsSortInput!] = {
    properties:[
      { name: "date_time", order: DESC }
    ]
  }
) {
  items: records (
    per_page: $size,
    page: $page,
    filter: {
      table: {
        value: "modules/insites_ecommerce/order"
      },
      id: { value: $keyword }
      properties: [
        { name: "order_contact_uuid", value: $order_contact_uuid }
        # { name: "order_number", contains: $keyword }
        { name: "date_time", range: {gte: $dateFrom, lte: $dateTo} }
        { name: "order_status", value_in: $orderStatus }
      ]
    },
    sort: $sort
  ) {            
    total_entries
    current_page
    total_pages
    results {
      id             
      uuid: property(name: "uuid")
      order_number: property(name: "order_number")
      date_time: property(name: "date_time")
      total_amount: property_float(name: "total_amount") 
      order_status: property(name: "order_status") 
      order_shipping_status: property(name: "order_shipping_status")               
    }
  }
}
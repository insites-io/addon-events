mutation create_payment(
    $uuid: String!
    $order_uuid: String!
    $source: String
    $status: String
    $notes: String
    $date_time: String!

    $payment_gateway_details: String
    $payment_gateway_name: String

    $card_last_four_digits: String
    $card_brand: String
    $card_expiry_month: String
    $card_expiry_year: String

    $currency: String!
    $amount: Float!
) {
    items: record_create(
        record: {
            table: "modules/insites_ecommerce/payment",
            properties: [
                { name: "uuid", value: $uuid }
                { name: "order_uuid", value: $order_uuid }
                { name: "source", value: $source }
                { name: "status", value: $status }
                { name: "notes", value: $notes }
                { name: "date_time", value: $date_time }

                { name: "payment_gateway_details", value: $payment_gateway_details }
                { name: "payment_gateway_name", value: $payment_gateway_name }

                { name: "card_last_four_digits", value: $card_last_four_digits }
                { name: "card_brand", value: $card_brand }
                { name: "card_expiry_month", value: $card_expiry_month }
                { name: "card_expiry_year", value: $card_expiry_year }

                { name: "currency", value: $currency }
                { name: "amount", value_float: $amount }
            ]
        }
    ) {
        id
        properties
    }
}
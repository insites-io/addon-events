query get_products (
  $id: ID,
  $page: Int = 1,
  $size: Int = 50,
  $not_uuid: String,
  $is_featured: Boolean,
  $sort_by: [RecordsSortInput!] = { 
    updated_at: { order: DESC }
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/product" }
      properties: [
        { name: "status", 
          #value: "enabled" 
          not_value_in: ["archived","disabled"]
        }
        { name: "is_featured", value_boolean: $is_featured }
        { name: "uuid", not_value: $not_uuid }
      ] 
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id         
      uuid: property(name: "uuid")
      slug: property(name: "slug")
      product_name: property(name: "product_name")
      sku: property(name: "sku")  
      category_uuids: property_array(name: "category_uuids")
      is_on_sale: property_boolean(name: "is_on_sale")
      sale_price: property_float(name: "sale_price")
      regular_price: property_float(name: "regular_price")
      is_featured: property_boolean(name: "is_featured")
      product_image: property_upload(name: "product_image") {
        url
      }
    }
  }
}
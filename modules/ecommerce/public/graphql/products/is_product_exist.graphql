query is_product_exist (  
  $page: Int = 1,
  $size: Int = 1,
  $slug: String!,
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/product" }
      properties: [
        { name: "status", value: "enabled" }
        { name: "slug", value: $slug }
      ] 
    }
  ) {
    total_entries
    results {
      id
      slug: property(name: "slug")  
      product_name: property(name: "product_name")  
      #category_uuids: property_array(name: "category_uuids")  
      category: related_record(
        table: "modules/insites_ecommerce/category"
        join_on_property: "category_uuids"
        foreign_property: "uuid"
      ){
        #id
        #uuid: property(name: "uuid")
        slug: property(name: "slug")
        category_name: property(name: "category_name")
      }
      #properties
    }
  }
}
query search_products(
  $page: Int = 1,
  $size: Int = 10,
  $keyword : String,
  $category_uuids: [String!],
  $brand: String,
  $is_on_sale: Boolean,
  $not_number: Int,
  $sort:[RecordsSortInput!] = [
    { updated_at: { order: DESC } }
  ]
){
  items: records(
    page: $page
    per_page: $size
    filter:{
      table:{
        value_in:["modules/insites_ecommerce/product"]
      }
      properties:[
      	{ name: "status", value: "enabled" }
        { name: "category_uuids", value_in: $category_uuids }
        { name: "is_on_sale", value_boolean: $is_on_sale }
        { name: "stock_level", not_value_int: $not_number }
        { name: "brand_name", value: $brand }
      ]
      fulltext:{
        keyword:$keyword
        match_type:CONTAINS
        operator:OR
      }
    }
    sort: $sort
  ){
    total_entries
    total_pages
    current_page
    results {
      id
      uuid: property(name: "uuid")      
      product_name: property(name: "product_name")
      slug: property(name: "slug")
      sku: property(name: "sku")
      stock_level: property_int(name: "stock_level")
      is_variant_enabled: property_boolean(name: "is_variant_enabled")
      is_featured: property_boolean(name: "is_featured")
      is_on_sale: property_boolean(name: "is_on_sale")
      regular_price: property_float(name: "regular_price")
      sale_price: property_float(name: "sale_price")
      brand: property(name: "brand_name")
      category_uuids: property_array(name: "category_uuids")
      product_image: property_upload(name: "product_image") {
        url
      }
      is_product_variant_enabled: property_boolean(name: "is_product_variant_enabled") 
      ## Get only the first variant
      variant: related_record(
        table: "modules/insites_ecommerce/product_variant"
        join_on_property: "uuid"
        foreign_property: "product_uuid"
      ){
        id
        is_on_sale: property_boolean(name: "is_product_on_sale")
        sale_price: property_float(name: "sale_price")  
        regular_price: property_float(name: "regular_price") 
        stock_level: property_int(name: "stock_level") 
        sku: property(name: "product_sku")
        product_options: property_array(name: "product_options")  
      }
    }
  }
}
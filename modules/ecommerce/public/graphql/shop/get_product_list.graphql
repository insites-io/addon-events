query get_product_list (
  $id: ID,
  $page: Int = 1,
  $size: Int = 10,
  $keyword: String,
  $category: [String!],
  $max_price: String,
  $min_price: String = "0",
  $sort_by: [RecordsSortInput!] = { 
    updated_at: { order: DESC }
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/product" }
      properties: [
        { name: "status", 
          #value: "enabled" 
          not_value_in: ["archived","disabled"]
        }
        { name: "name", contains: $keyword }
        { name: "categories", array_contains: $category }
      ] 
      or: [
        {
          properties: [
            { name: "regular_price",  range:{ gte: $min_price, lte:$max_price } }
          ]
        }
      ]
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      properties
      main_image: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "main_image"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
    }
  }
}
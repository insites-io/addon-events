query get_api_endpoint($event_type: String!) {
  items: records (
    page: 1,
    per_page: 1,
    filter: {
      table: {
        value: "modules/insites_ecommerce/webhook"
      },
      properties: [
        {
          name: "event_type" value: $event_type
        }
      ]
    }
  ){
    total_entries
    results {
      id
      properties
    }
  }
}
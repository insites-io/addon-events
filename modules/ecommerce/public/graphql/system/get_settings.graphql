query get_settings (
  $id: ID
){
  items: records(
    page: 1
    per_page: 1
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_configuration" }
    }
    sort: {
        updated_at: { order: DESC }
    }
  ) {
    total_entries
    results {
      id 
      currency: property(name: "currency")
      gateway_name: property(name: "gateway_name")
      inventory_tracking: property_boolean(name: "inventory_tracking") 
      weight_unit: property(name: "weight_unit")      
      measurement_unit: property(name: "measurement_unit")
    }
  }
}
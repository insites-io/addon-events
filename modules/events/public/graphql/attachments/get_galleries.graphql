query get_galleries(
  $page: Int = 1
  $size: Int = 50 
  $uuids: [String!]
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
       deleted_at: {exists: false}
       table: {value: "modules/insites_core/attachment"}
       properties: [
         {name: "uuid", value_in: $uuids}
       ]
     }
  ) {
    total_entries
    results {
      id
      uuid: property(name: "uuid")
      file: property_upload(name: "file") {
        url
      }
    }
  }
}

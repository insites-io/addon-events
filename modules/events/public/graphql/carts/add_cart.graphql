mutation add_cart (  
	$uuid: String!
  $contact_uuid: String!
) {
  items: record_create(
    record: {
      table: "modules/insites_ecommerce/cart"
      properties: [        
        { name: "uuid", value: $uuid }
        { name: "contact_uuid", value: $contact_uuid }
      ]
    }
  ) {
    id
    uuid: property(name: "uuid")
    created_at
    properties
  }
}
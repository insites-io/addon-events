query get_categories (
  $id: ID,
  $page: Int = 1,
  $size: Int = 50,
  $parent_category_uuids: [String!],
  $sort_by: [RecordsSortInput!] = {
      properties: [
          { name: "category_name", order: ASC }
      ]
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/category" }
      properties: [
        { name: "status", value: "enabled" }
        { name: "parent_category_uuids", value_array: $parent_category_uuids }
      ] 
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id             
			uuid: property(name: "uuid")
      slug: property(name: "slug")
      category_name: property(name: "category_name")
      parent_category_uuids: property(name: "parent_category_uuids")      
      custom_field: related_record(
        table: "modules/ins_ecommerce/category_custom_field"
        join_on_property: "uuid"
        foreign_property: "category_uuid"
        filter: {
          properties: {name: "is_featured", value_boolean: true}, 
          }
      ) {
        is_featured: property(name: "is_featured")
      }
    }
  }
}
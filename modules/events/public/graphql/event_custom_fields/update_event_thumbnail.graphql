mutation update_event_thumbnail (
    $id: ID!
    $url: String!
    $source: String!
) {
    items: record_update(
        form_name: "modules/events/update_event_thumbnail"
        id: $id
        record: {
            table: "modules/ins_events/event_custom_field"
            properties: [
                { name: "image_thumbnail", value: $url }
                { name: "image_thumbnail_source", value: $source }
            ]
        }
    ) {
        id
    }
}

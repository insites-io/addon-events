query get_user_event_tickets (
  $page: Int=1
  $size: Int=50
  $contact_uuid: String!
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_events/event_ticket" }
      properties: [
        { name: "contact_uuid", value: $contact_uuid }            
      ]             
    } 
  ) {
    total_entries    
    results {
      id
      uuid: property(name: "uuid")
      contact_uuid: property(name: "contact_uuid")
      event_uuid: property(name: "event_uuid")
	 #properties
    }
  }
}
query get_discount_code(
    $page: Int = 1,
    $size: Int = 1,
  	$discount_code: String
) {
    items: records(
      page: $page
      per_page: $size
      filter: {
        table: { value: "modules/insites_events/discount" }
        properties: [
            { name: "status", value: "enabled" }
          	{ name: "discount_code" value: $discount_code }
        ]    
        deleted_at: { exists: false }
      }
    ) {
        total_entries
        results {
            id
          
            uuid: property(name: "uuid")
            event_uuids: property(name: "event_uuids")
            allocations: property(name: "allocations")
            usage_count: property(name: "usage_count")
            usage_limit: property(name: "usage_limit")
            discount_code: property(name: "discount_code")
            discount_name: property(name: "discount_name")
            discount_type: property(name: "discount_type")
            discount_value: property_int(name: "discount_value")
            is_applicable_to_all_events: property(name: "is_applicable_to_all_events")
        }
    }
}
query get_event_gallery(
    $page: Int = 1, 
    $size: Int = 16,
  	$uuids: [String] 
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/insites_core/attachment" }
            deleted_at: { exists: false }
            properties: [
              { name: "uuid", value_in: $uuids}
              { name: "module_source", value: "Insites Events"}
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
           	## Images
            gallery: property_upload(name: "file") {
                url
                file_name
                extension
                versions
            }
        }
    }
}
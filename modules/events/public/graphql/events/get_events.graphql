query get_events (
  $page: Int=1
  $size: Int=20
  $uuids: [String!]
  $event_name: String
  $event_type: String
  $gt_date_now: String
  $lt_date_now: String
  $category_uuid: String
  $venue_state: String
  $sort_by: [RecordsSortInput!] = {
      properties: [
          { name: "start_date_time", order: ASC }
      ]
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_events/event" }
      properties: [
        { name: "status", contains: "enabled" }
        { name: "uuid", value_in: $uuids }
        { name: "event_name", contains: $event_name, exists: true }
        { name: "start_date_time", exists: true }
        { name: "end_date_time",  range:{ gt: $gt_date_now, lt: $lt_date_now  } }
        { name: "category_uuid", value: $category_uuid }
      ]
      or: [
        {
          properties: [
            { name: "venue_state", value: $venue_state, exists: true }
            { name: "event_type", value: $event_type }
          ] 
        }
        {
          ## venue_state can be null as long as the event_type is online_event
          properties: [
            { name: "venue_state", value: $venue_state, exists: false}
            { name: "event_type", contains: "online_event" }
          ] 
        }
      ]
    } 
    sort: $sort_by
  ) {
    total_entries    
    results {
      id
      uuid: property(name: "uuid")
      slug: property(name: "slug")
      event_name: property(name: "event_name")
      start_date_time: property(name: "start_date_time")
      end_date_time: property(name: "end_date_time")
      event_time_zone: property(name: "event_time_zone")
      event_type: property(name: "event_type")
      venue_name: property(name: "venue_name")
      venue_state: property(name: "venue_state")
      
      event_image: property_upload(name: "event_image") {
        url
      }        

      category: related_record(
        table: "modules/insites_events/event_system_field"
        join_on_property: "category_uuid"
        foreign_property: "uuid"
      ){
        value: property(name: "value")
      }
    }
  }
}
query generate_event_venue_areas(
    $page: Int = 1
    $size: Int = 100
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
           	table: { value: "modules/insites_events/event_venue_area" }
            deleted_at: { exists: false }         
        }
    ) {
        results {
          table
          properties  
        }
    }
}
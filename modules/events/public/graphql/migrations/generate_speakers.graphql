query generate_speakers(
    $page: Int = 1
    $size: Int = 100
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
          table: { value: "modules/insites_events/event_speaker" }
          deleted_at: { exists: false }         
        }
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
          table          
          properties  
        }
    }
}
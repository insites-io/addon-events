query generate_venues(
    $page: Int = 1
    $size: Int = 100
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
          table: { value: "modules/insites_events/venue" }
          deleted_at: { exists: false }         
        }
    ) {
        results {
          table
          properties    
        }
    }
}
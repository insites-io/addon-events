query get_product_brands($page: Int = 1, $size: Int = 100) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      table: {value_in: ["modules/insites_ecommerce/ecommerce_system_field"]}, 
      properties: [{name: "system_field", value: "brand"}]
    }
    sort: {
      properties: [{name: "value", order: ASC}]
    }
  ) {
    total_entries
    total_pages
    current_page
    results {
      brand: property(name: "value")
    }
  }
}
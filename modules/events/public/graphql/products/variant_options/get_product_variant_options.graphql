query get_product_variant_options (
  $product_uuid: String!,
  $page: Int = 1,
  $size: Int = 20
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/product_variant_option" }
      properties: [
        { name: "product_uuid", value: $product_uuid }
      ] 
    }
  ) {
    total_entries
    results {
      id    
      product_uuid: property(name: "product_uuid")
      product_option_label: property(name: "product_option_label")  
      product_option_values: property_array(name: "product_option_values") 
    }
  }
}
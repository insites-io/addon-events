  ## shipping_status options:
  ## Packed, Picked Up, In Transit, Delivered

  - name: freight_uuid
    type: string

  - name: freight_supplier_name
    type: string

  - name: freight_method
    type: string

  - name: freight_option
    type: array

  - name: freight_tracking_code
    type: string

  - name: freight_tracking_link
    type: string

  - name: freight_dispatched_date_time
    type: datetime

  - name: freight_delivered_date_time
    type: datetime

  ## Order Details
  - name: order_reference
    type: string

  - name: order_status
    type: string
    metadata:
      options:
        [
          "open",
          "processing",
          "on_hold",
          "cancelled",
          "refunded",
          "completed",
          "subscription_active",
          "subscription_cancelled",
          "other",
        ]

  - name: order_payment_status
    type: string
    metadata:
      options:
        [
          "unpaid",
          "paid",
          "part_paid",
          "no_charge",
          "failed",
          "refunded",
          "other",
        ]

  - name: order_shipping_status
    type: string
    metadata:
      options:
        ["not_applicable", "packed", "picked_up", "in_transit", "delivered"]

  - name: order_company_uuid
    type: string

  - name: order_company_name
    type: string

  - name: order_company_email
    type: string

  - name: order_company_phone_country_code
    type: string

  - name: order_company_phone_number
    type: string

  - name: order_contact_uuid
    type: string


  - name: order_contact_last_name
    type: string

  - name: order_contact_email
    type: string

  - name: order_contact_phone_country_code
    type: string

  - name: order_contact_phone_number
    type: string

  - name: notes
    type: string

  ## Digits
  - name: date_time
    type: datetime

  - name: currency
    type: string

  - name: subtotal_amount
    type: float

  - name: total_tax_amount
    type: float
    default_value: 0

  - name: total_amount
    type: float
    default_value: 0

  - name: total_shipping_amount
    type: float
    default_value: 0

  - name: total_amount_paid
    type: float

  - name: total_discount_amount
    type: float
    default_value: 0

  ## PDF
  - name: tax_invoice_pdf
    type: upload

  - name: picking_slip_pdf
    type: upload

  - name: packaging_label_pdf
    type: upload

  ## EXTERNAL FIELDS
  - name: is_scheduled
    type: boolean

  - name: is_recurring
    type: boolean

  - name: recurring_group_id
    type: string

  - name: opportunity_uuid
    type: string

  ## DISCOUNT CODE
  - name: discount_code_uuids
    type: array
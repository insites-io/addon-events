mutation update_user_profile (
  $id: ID,
  $first_name: String!,
  $last_name: String!,
  $email: String!
) {
  items: user_update(
    form_name: "modules/ins_template_ecommerce/update_user_info"
    id: $id
    user:{
      first_name: $first_name,
      last_name: $last_name,
      email: $email
    }
  ){
    id
  }
}
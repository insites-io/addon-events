query get_credit_card (
  $id: ID,
  $page: Int = 1,
  $size: Int = 10,
  $gateway_id: String,
  $gateway_customer_id: String,
  $user_id: String
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_credit_card" }
      properties: [
        { name: "gateway_id", value: $gateway_id }
        { name: "gateway_customer_id", value: $gateway_customer_id }
        { name: "user_id", value: $user_id }
        { name: "is_enabled", value_boolean: true }
      ] 
    }
    sort: { updated_at: { order: DESC } }
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      properties
    }
  }
}
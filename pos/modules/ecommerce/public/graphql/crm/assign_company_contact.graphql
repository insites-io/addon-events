mutation assign_company_contact (
  $id: ID!,
  $company_id: String
) {
  items: user_update (
    id: $id
  	user: {
      profiles: [
        {
          name: "modules/insites_core/insites_customer",
          values: {
            deleted_at: null,
            properties: [
              { name: "company_id", value: $company_id }
            ]
          }
        }
      ]
    }
  ) {
    id
    created_at
    updated_at
    first_name
    last_name
    email
    customer_details: profiles(profile_type: "modules/insites_core/insites_customer") {
      company_id: property(name: "company_id")
    }
  }
} 
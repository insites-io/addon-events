mutation create_crm_company(
  $company_name: String!,
  $company_email: String,
  $company_email_2: String,
  $assigned_to: String, ## IIA Administrator ID
  $website: String,
  $company_type: String,
  $industry_type: String,
  $rbn: String,
  $notes: String,
  $tax_registered: Boolean,
  $tax_reference: String,
  $company_status: String,
  $home_phone_country_code: String,
  $home_phone_area_code: String,
  $home_phone_number: String,
  $mobile_phone_country_code: String,
  $mobile_phone_area_code: String,
  $mobile_phone_number: String,
  $work_phone_country_code: String,
  $work_phone_area_code: String,
  $work_phone_number: String,
  $facebook_link: String,
  $youtube_link: String,
  $google_plus_link: String,
  $twitter_link: String,
  $linkedin_link: String,
  $instagram_link: String,
  $profile_image: String,
  $is_enabled: Boolean = true
) {
  items: record_create(
    record: {
      table: "modules/insites_core/insites_company",
    	properties: [
        { name: "company_name", value: $company_name }
        { name: "company_email", value: $company_email }
        { name: "company_email_2", value: $company_email_2 }
        { name: "assigned_to", value: $assigned_to }
        { name: "website", value: $website }
        { name: "company_type", value: $company_type }
        { name: "industry_type", value: $industry_type }
        { name: "rbn", value: $rbn }
        { name: "is_enabled", value_boolean: $is_enabled }
        { name: "notes", value: $notes }
        { name: "home_phone_country_code", value: $home_phone_country_code }
        { name: "home_phone_area_code", value: $home_phone_area_code }
        { name: "home_phone_number", value: $home_phone_number }
        { name: "mobile_phone_country_code", value: $mobile_phone_country_code }
        { name: "mobile_phone_area_code", value: $mobile_phone_area_code }
        { name: "mobile_phone_number", value: $mobile_phone_number } 
        { name: "work_phone_country_code", value: $work_phone_country_code }
        { name: "work_phone_area_code", value: $work_phone_area_code }
        { name: "work_phone_number", value: $work_phone_number }
        { name: "facebook_link", value: $facebook_link }
        { name: "youtube_link", value: $youtube_link }
        { name: "google_plus_link", value: $google_plus_link }
        { name: "twitter_link", value: $twitter_link }
        { name: "linkedin_link", value: $linkedin_link }
        { name: "instagram_link", value: $instagram_link }
        { name: "tax_registered", value_boolean: $tax_registered }
        { name: "tax_reference", value: $tax_reference }
        { name: "company_status", value: $company_status }
      ],
      images: [{ 
        name: "profile_image"
        remote_image_url: $profile_image
      }]
    }
  ) {
    id
    created_at
    updated_at
    company_name: property(name: "company_name")

    # properties
    # addresses: related_records(
    #   table: "modules/insites_core/insites_address"
    #   join_on_property: "id"
    #   foreign_property: "source_id"
    # ) {
    #   id
    #   properties
    # }
  }
}
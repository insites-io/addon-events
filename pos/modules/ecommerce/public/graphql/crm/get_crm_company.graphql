query get_crm_company (
  $page: Int = 1, 
  $size: Int = 10, 
  $id: ID,
  $keyword: String,
  $company_name: String,
  $is_enabled: Boolean,
  $sort: RecordsSortInput = { updated_at: { order: DESC }}
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      table: { value: "modules/insites_core/insites_company" }
      deleted_at: { exists: false }
      properties: [ 
        { name: "is_enabled", value_boolean: $is_enabled } 
        { name: "company_name", contains: $keyword, value: $company_name }
      ]
    }
    sort: [ $sort ]
  ) {
        total_entries
        total_pages
        current_page
        per_page
        results {
            id  
            created_at 
            updated_at
          	company_name: property(name: "company_name")
        }
  	}
}
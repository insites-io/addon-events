mutation callback_update_cart_discount_codes (
  $ids: [ID!]
  $discount_debited: Boolean
  $user_id: String
  $order_id: String
) {
  items: records_update_all (
    sync: true
    table: "modules/insites_ecommerce/insites_cart_discount_codes" 
    filter: {
      id: { value_in: $ids }
    }
    record: {
      properties: [
        { name: "discount_debited", value_boolean: $discount_debited }
        { name: "user_id", value: $user_id }
        { name: "order_id", value: $order_id }
      ]
    }
  ) {
    count
  }
}
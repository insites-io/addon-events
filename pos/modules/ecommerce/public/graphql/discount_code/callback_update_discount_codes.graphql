mutation callback_update_discount_codes (
  $ids: [ID!]
  $number_of_use: Float = 1
) {
  items: records_update_all (
    sync: true
    table: "modules/insites_ecommerce/insites_discount_codes"
    filter: {
      id: { value_in: $ids }
      properties: { name: "unlimited_use", value_boolean: false }
    }
    record: {
      properties: [
        { name: "number_of_use", decrement: $number_of_use }
      ]
    }
  ) {
    count
  }
}

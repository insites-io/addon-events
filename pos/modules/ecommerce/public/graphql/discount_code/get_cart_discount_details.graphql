query get_cart_discount_details (
  $id: ID,
  $ids: [ID!],
  $not_id: [ID!], 
  $page: Int = 1,
  $size: Int = 50,
  $user_id: String,
  $order_id: String,
  $discount_code: String
  $discount_code_id: String
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id, not_value_in: $not_id, value_in: $ids }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_cart_discount_codes" }
      properties: [
        { name: "user_id", value: $user_id }
        { name: "order_id", value: $order_id }
        { name: "discount_code", value: $discount_code }
        { name: "discount_code_id", value: $discount_code_id }
      ] 
    }
    sort: { created_at: { order: ASC } }
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      # properties
      discounted_cart_ids: property_array(name: "discounted_cart_ids")
      cart_details: related_records(
        table: "modules/insites_ecommerce/insites_cart"
        join_on_property: "discounted_cart_ids"
        foreign_property: "id"
      ) {
        id
        properties
      }
      
      discount_code: related_record(
        table: "modules/insites_ecommerce/insites_discount_codes"
        join_on_property: "discount_code",
        foreign_property: "id"
        sort: { updated_at: { order: DESC }}
        filter: {
          deleted_at: { exists: false }
          properties: { name: "is_enabled", value_boolean: true }
        }
      ) {
        id
        properties
      }
    }
  }
}
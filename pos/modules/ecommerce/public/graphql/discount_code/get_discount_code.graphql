query get_discount_code (
  $id: ID,
  $page: Int = 1,
  $size: Int = 10,
  $filter_properties: [PropertyFilterInput!]
) {
  items: records (
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_discount_codes" }
      properties: $filter_properties
    }
    sort: { updated_at: { order: DESC } } 
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      properties
    }
  }
}
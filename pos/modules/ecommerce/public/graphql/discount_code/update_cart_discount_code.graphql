mutation update_cart_discount_code (
  $id: ID!
  $order_id: String
  $discount_code_id: String
  $discount_name: String
  $discount_code: String
  $discount_type: String
  $discount_value: Float
  $discount_debited: Boolean
  $discounted_cart_ids: [String]
  $discounted_quantity: Float 
  $discounted_amount: Float 
) {
  items: record_update (
    id: $id
    record: {
      table: "modules/insites_ecommerce/insites_cart_discount_codes"
      properties: [
        { name: "order_id", value: $order_id }
        { name: "discount_code_id", value: $discount_code_id }
        { name: "discount_name", value: $discount_name }
        { name: "discount_code", value: $discount_code }
        { name: "discount_type", value: $discount_type }
        { name: "discount_value", value_float: $discount_value }
        { name: "discount_debited", value_boolean: $discount_debited }
        { name: "discounted_cart_ids", value_array: $discounted_cart_ids }
        { name: "discounted_quantity", value_float: $discounted_quantity }
        { name: "discounted_amount", value_float: $discounted_amount }
      ]
    }
  ) {
    id
    created_at
    properties
  }
}
mutation create_order(
    $shipping_company_name: String
    $shipping_first_name: String
    $shipping_last_name: String
    $shipping_email: String
    $shipping_phone: String
    $shipping_address_1: String
    $shipping_address_2: String
    $shipping_address_3: String
    $shipping_city: String
    $shipping_county: String
    $shipping_district: String
    $shipping_suburb: String
    $shipping_state: String
    $shipping_country: String
    $shipping_country_code: String
    $shipping_postcode: String

    $billing_company_name: String
    $billing_first_name: String
    $billing_last_name: String
    $billing_email: String
    $billing_phone: String
    $billing_address_1: String
    $billing_address_2: String
    $billing_address_3: String
    $billing_city: String
    $billing_county: String
    $billing_district: String
    $billing_suburb: String
    $billing_state: String
    $billing_country: String
    $billing_country_code: String
    $billing_postcode: String

    $gateway_id: String
    $gateway_customer_id: String
    $user_id: String

    $order_number: String
    $order_status: String
    $order_payment_status: String
    $shipping_status: String
    $freight_supplier: String
    $tracking_code: String

    $date_time: String!
    $notes: String
    $last_updated_by_id: String
    $is_enabled: Boolean = true

    $currency: String!
    $order_value: Float!
    $tax_amount: Float!
    $shipping_amount: Float!
    $total_amount: Float!
    $amount_due: Float!
) {
    items: record_create(
        record: {
            table: "modules/insites_ecommerce/insites_order",
            properties: [
                { name: "shipping_company_name", value: $shipping_company_name }
                { name: "shipping_first_name", value: $shipping_first_name }
                { name: "shipping_last_name", value: $shipping_last_name }
                { name: "shipping_email", value: $shipping_email }
                { name: "shipping_phone", value: $shipping_phone }
                { name: "shipping_address_1", value: $shipping_address_1 }
                { name: "shipping_address_2", value: $shipping_address_2 }
                { name: "shipping_address_3", value: $shipping_address_3 }
                { name: "shipping_city", value: $shipping_city }
                { name: "shipping_county", value: $shipping_county }
                { name: "shipping_district", value: $shipping_district }
                { name: "shipping_suburb", value: $shipping_suburb }
                { name: "shipping_state", value: $shipping_state }
                { name: "shipping_country", value: $shipping_country }
                { name: "shipping_country_code", value: $shipping_country_code }
                { name: "shipping_postcode", value: $shipping_postcode }

                { name: "billing_company_name", value: $billing_company_name }
                { name: "billing_first_name", value: $billing_first_name }
                { name: "billing_last_name", value: $billing_last_name }
                { name: "billing_email", value: $billing_email }
                { name: "billing_phone", value: $billing_phone }
                { name: "billing_address_1", value: $billing_address_1 }
                { name: "billing_address_2", value: $billing_address_2 }
                { name: "billing_address_3", value: $billing_address_3 }
                { name: "billing_city", value: $billing_city }
                { name: "billing_county", value: $billing_county }
                { name: "billing_district", value: $billing_district }
                { name: "billing_suburb", value: $billing_suburb }
                { name: "billing_state", value: $billing_state }
                { name: "billing_country", value: $billing_country }
                { name: "billing_country_code", value: $billing_country_code }
                { name: "billing_postcode", value: $billing_postcode }

                { name: "gateway_id", value: $gateway_id }
                { name: "gateway_customer_id", value: $gateway_customer_id }
                { name: "user_id", value: $user_id }

                { name: "order_number", value: $order_number }
                { name: "order_status", value: $order_status }
                { name: "order_payment_status", value: $order_payment_status }
                { name: "shipping_status", value: $shipping_status }
                { name: "freight_supplier", value: $freight_supplier }
                { name: "tracking_code", value: $tracking_code }

                { name: "date_time", value: $date_time }
                { name: "notes", value: $notes }
                { name: "last_updated_by_id", value: $last_updated_by_id }
                { name: "is_enabled", value_boolean: $is_enabled }

                { name: "currency", value: $currency }
                { name: "order_value", value_float: $order_value }
                { name: "tax_amount", value_float: $tax_amount }
                { name: "shipping_amount", value_float: $shipping_amount }
                { name: "total_amount", value_float: $total_amount }
                { name: "amount_due", value_float: $amount_due }
            ]
        }
    ) {
        id
        properties
    }
}
query get_order_details (
  $id: ID
  $user_id: String
  ){
  items: records(
    per_page: 1
    filter: {
      id: { value: $id }
      deleted_at:{ exists:false }
      table: { value: "modules/insites_ecommerce/insites_order" }
      properties:[
        { name: "user_id", value: $user_id }
      ]
    }
  ){
    results {
      id
      created_at
      properties
      ## only works for 'last payment' / 'latest payment' 
      payment: related_record(
        table: "modules/insites_ecommerce/insites_payment"
        join_on_property: "id"
        foreign_property: "order_id"
        sort: { updated_at: { order: DESC }}
      ) {
        card_brand: property(name: "card_brand")
        card_last4: property(name: "card_last4")
        card_exp_month: property(name: "card_exp_month")
        card_exp_year: property(name: "card_exp_year")
      }
      related_user {
        id
        name
        email
      }
      cart: related_records(
        table: "modules/insites_ecommerce/insites_cart"
        foreign_property:"order_id", 
        join_on_property: "id") {
          properties
        
          product: related_record(
            table: "modules/insites_ecommerce/insites_product"
            foreign_property:"id", 
            join_on_property: "product_id") {

            unit_label: property(name: "unit_label")
          }
      }
    }
  }
}
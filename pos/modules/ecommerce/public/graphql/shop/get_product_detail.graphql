query get_product_detail (
  $id: ID,
  $slug: String,
  $page: Int = 1,
  $size: Int = 10,
  $is_enabled: Boolean,
  $is_archived: Boolean,
  $sort_by: [RecordsSortInput!] = { 
    updated_at: { order: DESC }
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_product" }
      properties: [
        { name: "is_enabled", value_boolean: $is_enabled }
        { name: "is_archived", value_boolean: $is_archived }
        { name: "slug", value: $slug }
      ] 
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      properties

      meta_title: property(name: "meta_title")   
      meta_description: property(name: "meta_description")  
      search_engine_visibility: property_boolean(name: "search_engine_visibility")  
      canonical_url: property(name: "canonical_url")  
      og_title: property(name: "og_title")  
      og_description: property(name: "og_description")  
      og_site_name: property(name: "og_site_name")  
      og_url: property(name: "og_url")  
      og_type: property(name: "og_type")  
      variant_enabled: property_boolean(name: "variant_enabled")  
      variant_schema: property(name: "variant_schema")  
      stock: property_int(name: "stock")  
      sale_price: property_int(name: "sale_price")  
      regular_price: property_int(name: "regular_price")  
      name: property(name: "name")  
      sku: property(name: "sku")  
      short_description: property(name: "short_description")  
      long_description: property(name: "long_description")  
      custom_field_1: property(name: "custom_field_1")  
      custom_field_2: property(name: "custom_field_2")  
      custom_field_3: property(name: "custom_field_3")  
      custom_field_4: property(name: "custom_field_4") 

      og_image: property_upload (name: "og_image") {
        url
        file_name
        versions
      }
      
      main_image: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "main_image"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
      media_1: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "media_1"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
      media_2: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "media_2"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
      media_3: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "media_3"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
      media_4: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "media_4"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
      gallery_1: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "gallery_1"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
      gallery_2: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "gallery_2"
      ) {
        id
        
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
    }
  }
}
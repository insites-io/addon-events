query get_product_detail_minified (
  $id: ID,
  $slug: String,
  $page: Int = 1,
  $size: Int = 10,
  $is_enabled: Boolean,
  $is_archived: Boolean,
  $sort_by: [RecordsSortInput!] = { 
    updated_at: { order: DESC }
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_product" }
      properties: [
        { name: "is_enabled", value_boolean: $is_enabled }
        { name: "is_archived", value_boolean: $is_archived }
        { name: "slug", value: $slug }
      ] 
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      regular_price: property_float(name: "regular_price")
      on_sale: property_boolean(name: "on_sale")
      sale_price: property_float(name: "sale_price")
      tax: property_float(name: "tax")
      free_shipping: property_boolean(name: "free_shipping")
      shipping_cost: property_float(name: "shipping_cost")
      stock: property_int(name: "stock")  
    }
  }
}
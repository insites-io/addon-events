query get_product_schema($id: ID, $name: String) {
  items: admin_model_schemas(
    page: 1
    per_page: 1
    filter: {
      id: { value: $id }
      parameterized_name: { value: $name }
    }
    sort: {
      updated_at: { order: DESC }
    }
  ) {
    total_entries
    results {
      id
      name
      parameterized_name
      physical_file_path
      metadata
      properties{
        id
        name
        attribute_type
        metadata
        options
      }
    }
  }
}
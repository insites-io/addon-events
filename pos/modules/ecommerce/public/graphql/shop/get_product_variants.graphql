query get_product_variants (
  $id: ID,
  $name: String
  $page: Int = 1
  $size: Int = 500
  $is_enabled: Boolean = true,
  $properties: [ModelsFilterInput!]
  $sort_by: [RecordsSortInput!] = { 
    properties: { name: "stock", order: DESC }
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: $name }
      properties: [
        { name: "is_enabled", value_boolean: $is_enabled }
      ]
      or: $properties
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      properties
      
      ## Gallery
      gallery_1: related_records(
        table: "modules/insites_ecommerce/insites_product_uploads"
        foreign_property: "id"
        join_on_property: "gallery_1"
      ) {
        id
        file: property_upload (name: "file") {
          url
          file_name
          versions 
        }
      }
    }
  }
}
query get_product_variants_is_exist (
  $id: ID,
  $name: String
  $page: Int = 1
  $size: Int = 500
  $is_enabled: Boolean = true,
  $properties: [RecordsFilterInput!]
  $sort_by: [RecordsSortInput!] = { 
    properties: { name: "stock", order: DESC }
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: $name }
      properties: [
        { name: "is_enabled", value_boolean: $is_enabled }
      ]
      or: $properties
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      on_sale: property_boolean(name: "on_sale")      
    }
  }
}
query get_api_endpoint($name: String!) {
  items: records (
    page: 1,
    per_page: 1,
    filter: {
      table: {
        value: "modules/insites_ecommerce/insites_api_call_endpoint"
      },
      properties: [
        {
          name: "name"
          value: $name
        }
      ]
    }
  ){
    total_entries
    results {
      id
      properties
    }
  }
}
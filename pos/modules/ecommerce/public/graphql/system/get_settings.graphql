query get_settings ($id: ID){
  items: records(
    page: 1
    per_page: 1
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_settings" }
    }
    sort: {
        updated_at: { order: DESC }
    }
  ) {
    total_entries
    results {
      id 
      created_at
      updated_at
      properties
      
    }
  }
}
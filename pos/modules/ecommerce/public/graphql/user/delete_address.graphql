mutation delete_address (
  $id: ID!
) {
  items: record_update(
    id: $id
    record: {
      table: "modules/insites_core/insites_address",
    	properties: [
        { name: "is_enabled", value_boolean: false }
      ]
    }
  ) {
    id
    updated_at
    is_enabled: property(name: "is_enabled")
  }
} 